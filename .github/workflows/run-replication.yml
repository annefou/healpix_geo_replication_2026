# Run HEALPix-geo Benchmark Replication
#
# Uses the pre-built Docker image to run benchmarks + comparison.
#
# NOTE: GitHub Actions runners have limited memory (~7GB), so we use reduced
# dataset sizes by default.
#
# Triggered on:
# - Manual trigger (workflow_dispatch)
# - New release
# - Weekly schedule (continuous verification)

name: Run Replication

on:
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark to run'
        required: true
        default: 'ci-test'
        type: choice
        options:
          - ci-test
          - quick-test
          - full
      random_seed:
        description: 'Random seed for reproducibility'
        required: false
        default: '42'
        type: string
      image_tag:
        description: 'Docker image tag to use'
        required: false
        default: 'latest'
        type: string

  release:
    types: [published]

  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: read

jobs:
  replication:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: image
        run: |
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full_name=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Using image: ${IMAGE}"

      - name: Pull Docker image
        run: |
          docker rmi ${{ steps.image.outputs.full_name }} 2>/dev/null || true
          docker pull ${{ steps.image.outputs.full_name }}

      - name: Create results directory
        run: mkdir -p results

      - name: Determine benchmark parameters
        id: params
        run: |
          BENCHMARK_TYPE="${{ github.event.inputs.benchmark_type || 'ci-test' }}"

          case "$BENCHMARK_TYPE" in
            "quick-test")
              VECTOR_LAYERS="5,10"
              RASTER_LAYERS="5,10"
              HEALPIX_DEPTH="7"
              echo "### Benchmark Mode: Quick Test" >> $GITHUB_STEP_SUMMARY
              ;;
            "ci-test")
              VECTOR_LAYERS="5,10,20,50,100"
              RASTER_LAYERS="10,50,100,500"
              HEALPIX_DEPTH="9"
              echo "### Benchmark Mode: CI Test" >> $GITHUB_STEP_SUMMARY
              ;;
            "full")
              VECTOR_LAYERS="10,20,50,100,200,500,1000"
              RASTER_LAYERS="10,50,100,500,1000,5000,10000"
              HEALPIX_DEPTH="9"
              echo "### Benchmark Mode: Full" >> $GITHUB_STEP_SUMMARY
              echo "Warning: Requires >16GB RAM" >> $GITHUB_STEP_SUMMARY
              ;;
          esac

          echo "vector_layers=${VECTOR_LAYERS}" >> $GITHUB_OUTPUT
          echo "raster_layers=${RASTER_LAYERS}" >> $GITHUB_OUTPUT
          echo "healpix_depth=${HEALPIX_DEPTH}" >> $GITHUB_OUTPUT
          echo "- Vector layers: ${VECTOR_LAYERS}" >> $GITHUB_STEP_SUMMARY
          echo "- Raster layers: ${RASTER_LAYERS}" >> $GITHUB_STEP_SUMMARY
          echo "- HEALPix depth: ${HEALPIX_DEPTH}" >> $GITHUB_STEP_SUMMARY

      - name: Run HEALPix-geo benchmarks
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/app/results \
            -e RANDOM_SEED=${{ github.event.inputs.random_seed || '42' }} \
            -e VECTOR_LAYERS=${{ steps.params.outputs.vector_layers }} \
            -e RASTER_LAYERS=${{ steps.params.outputs.raster_layers }} \
            -e HEALPIX_DEPTH=${{ steps.params.outputs.healpix_depth }} \
            ${{ steps.image.outputs.full_name }} \
            python run_healpix_geo_replication.py --all --output results

      - name: Run comparison against H3 reference
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/app/results \
            ${{ steps.image.outputs.full_name }} \
            python run_comparison.py --healpix-geo results --output results

      - name: Generate summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Replication Results" >> $GITHUB_STEP_SUMMARY

          if [ -f results/summary_healpix_geo.json ]; then
            echo "### HEALPix-geo Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat results/summary_healpix_geo.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/comparison_summary.json ]; then
            echo "### Comparison Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat results/comparison_summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la results/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No results directory"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replication-results-${{ github.run_id }}
          path: results/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload to release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            results/*.csv
            results/*.json
            results/*.png
            results/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
